{w:1,t:'Where Have All the Good Men Gone?',text:'Genesis 1–3',big:'Good manhood is a God-given calling lived under Jesus: faithful work, obedience, sacrificial love, and humble responsibility.'},

function fmt(d){return new Date(d+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});} 
function todayReading(){let today=new Date(); today.setHours(0,0,0,0); return readings.find(r=>new Date(r[0]+'T00:00:00')>=today)||readings[readings.length-1];}

 if(name=='Reading Plan') m.innerHTML=`<section class="section"><h2>Rooted in the Word Reading Plan</h2><p class="small">July 5 – September 5, 2026. Read the New Testament passage first, then the wisdom or Old Testament companion reading.</p><div class="panel">${readings.map(r=>`<div class="reading-row ${r[0]==tr[0]?'today':''}"><div><strong>${fmt(r[0])}</strong>${r[0]==tr[0]?'<div class="tag">TODAY</div>':''}</div><div><strong>${r[1]}</strong></div><div>${r[2]}<div class="small">${r[3]}</div></div></div>`).join('')}</div></section>`;
 if(name=='Weekly Sermons') m.innerHTML=`<section class="section"><h2>Weekly Sermons</h2><p class="small">Paste the four YouTube links into the placeholders in the HTML file when you are ready.</p><div class="grid two">${sermons.map(s=>`<div class="panel"><h2>Week ${s.w}: ${s.t}</h2><p class="eyebrow">${s.text}</p><div class="video-box">YouTube video placeholder<br><span class="small">Replace this with your YouTube embed link.</span></div><div class="note"><strong>Big Idea:</strong> ${s.big}</div></div>`).join('')}</div></section>`;

 if(name=='Prayer & Brotherhood') m.innerHTML=`<section class="section grid two"><div class="panel"><h2>Prayer for One Another</h2><p>Each man intentionally prays for another man in the group each day. This can be quiet prayer, a text, a call, or a conversation.</p><div class="note">Reach out when you need prayer, encouragement, wisdom, or accountability. Share specific struggles when appropriate, and share praise when God is doing something good.</div></div><div class="panel"><h2>Gathering Rhythm</h2><ul><li>Opening Prayer</li><li>Honest Discussion</li><li>Personal Reflection</li><li>Practical Action</li><li>Prayer for One Another</li></ul><p><strong>Gatherings:</strong> July 17, July 31, August 14, August 28</p></div></section>`;
